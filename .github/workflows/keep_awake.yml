name: Keep Streamlit Awake

on:
  schedule:
    
    - cron: '0 */6 * * *' # Runs every 6 hours 
  workflow_dispatch: # This allows you to click a button to test it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # Replace the URL below with the actual link to your 9-Way Recommender
        run: curl -sL "https://9-way-recommender-system.streamlit.app/" > /dev/null
